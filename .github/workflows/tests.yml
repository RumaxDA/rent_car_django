name: Django Tests

on:
  push: 
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: rental_db
          POSTGRES_USER: rental_user
          POSTGRES_PASSWORD: rental_password
        ports:
          - 5432:5432
        
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Downloading the repository code
      uses: actions/checkout@v4

    - name: Python environment configuration
      uses: actions/setup-python@v4
      with: 
        python-version: '3.13'

    - name: Installing dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Running Pytest with a database
      env:
        DJANGO_SECRET_KEY: "super-secret-test-key-only-for-github-actions"
        DEBUG: "True"
        DATABASE_ENGINE: "postgresql"
        DATABASE_NAME: "rental_db"
        DATABASE_USERNAME: "rental_user"
        DATABASE_PASSWORD: "rental_password"
        DATABASE_HOST: "localhost"
        DATABASE_PORT: "5432"
      run: |
        pytest 

        
        