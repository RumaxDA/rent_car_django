name: Python Code Linter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  flake8-check:
    runs-on: ubuntu-latest

    steps:
    - name: Downloading the repository code
      uses: actions/checkout@v4

    - name: Python environment configuration
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Flake8 Installation
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Code analysis (Flake8)
      run: flake8 . --count --max-line-length=119 --show-source --statistics